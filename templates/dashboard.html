<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ store_name }} - オーナーダッシュボード</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans",sans-serif; background:#f5f5f5; color:#333; }

/* ヘッダー */
.header { background:linear-gradient(135deg,#E05241,#c0392b); color:#fff; padding:16px 20px; position:sticky; top:0; z-index:100; box-shadow:0 2px 8px rgba(0,0,0,.15); }
.header h1 { font-size:18px; font-weight:700; }
.header small { opacity:.8; font-size:12px; }

/* タブ */
.tabs { display:flex; background:#fff; border-bottom:2px solid #eee; position:sticky; top:56px; z-index:99; }
.tab { flex:1; padding:14px 8px; text-align:center; font-size:14px; font-weight:600; cursor:pointer; border-bottom:3px solid transparent; transition:.2s; color:#888; }
.tab.active { color:#E05241; border-bottom-color:#E05241; }
.tab:hover { background:#fafafa; }

/* コンテンツ */
.content { max-width:960px; margin:0 auto; padding:16px; }
.panel { display:none; }
.panel.active { display:block; }

/* カード */
.card { background:#fff; border-radius:12px; box-shadow:0 1px 4px rgba(0,0,0,.08); margin-bottom:12px; overflow:hidden; }
.card-header { padding:14px 16px; font-weight:700; font-size:15px; border-bottom:1px solid #f0f0f0; display:flex; justify-content:space-between; align-items:center; }
.card-body { padding:16px; }

/* フィルター */
.filter-bar { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
.filter-btn { padding:8px 16px; border-radius:20px; border:1px solid #ddd; background:#fff; font-size:13px; cursor:pointer; transition:.2s; }
.filter-btn.active { background:#E05241; color:#fff; border-color:#E05241; }

/* テーブル */
.table-wrap { overflow-x:auto; }
table { width:100%; border-collapse:collapse; font-size:13px; }
th { background:#f8f8f8; padding:10px 12px; text-align:left; font-weight:600; white-space:nowrap; border-bottom:2px solid #eee; }
td { padding:10px 12px; border-bottom:1px solid #f0f0f0; }
tr:hover { background:#fafafa; }

/* ステータスバッジ */
.badge { display:inline-block; padding:3px 10px; border-radius:10px; font-size:11px; font-weight:600; }
.badge-confirmed { background:#e8f5e9; color:#2e7d32; }
.badge-cancelled { background:#fce4ec; color:#c62828; }
.badge-completed { background:#e3f2fd; color:#1565c0; }

/* ボタン */
.btn { padding:6px 14px; border-radius:8px; border:none; font-size:12px; font-weight:600; cursor:pointer; transition:.2s; }
.btn-danger { background:#ffebee; color:#c62828; }
.btn-danger:hover { background:#ef9a9a; color:#fff; }
.btn-primary { background:#E05241; color:#fff; }
.btn-primary:hover { background:#c0392b; }
.btn-secondary { background:#f0f0f0; color:#333; }

/* フォーム */
.form-row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-top:12px; }
.form-input, .form-select { padding:8px 12px; border:1px solid #ddd; border-radius:8px; font-size:14px; }
.form-input:focus, .form-select:focus { outline:none; border-color:#E05241; }

/* 定休日リスト */
.closed-item { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid #f0f0f0; }
.closed-item:last-child { border:none; }

/* 統計 */
.stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:12px; margin-bottom:16px; }
.stat-card { background:#fff; border-radius:12px; padding:16px; text-align:center; box-shadow:0 1px 4px rgba(0,0,0,.08); }
.stat-number { font-size:28px; font-weight:700; color:#E05241; }
.stat-label { font-size:12px; color:#888; margin-top:4px; }

/* ローディング */
.loading { text-align:center; padding:40px; color:#999; }

/* 空状態 */
.empty { text-align:center; padding:40px; color:#999; font-size:14px; }

/* 締切ボタン */
.deadline-btn { background:#f0f0f0; color:#333; border:2px solid transparent; border-radius:8px; }
.deadline-btn.active { background:#E05241; color:#fff; border-color:#E05241; }
.deadline-btn[data-hours="0"].active { background:#2e7d32; border-color:#2e7d32; }

/* レスポンシブ */
@media(max-width:600px) {
  .tab { font-size:12px; padding:12px 4px; }
  th, td { padding:8px 6px; font-size:12px; }
  .stats { grid-template-columns:repeat(2,1fr); }
}
</style>
</head>
<body>

<div class="header" style="display:flex;justify-content:space-between;align-items:center;">
  <div>
    <h1>{{ store_name }}</h1>
    <small>オーナーダッシュボード</small>
  </div>
  <a href="/dashboard/logout" style="color:#fff;font-size:13px;opacity:.8;text-decoration:none;">ログアウト ↗</a>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('reservations')">📋 予約管理</div>
  <div class="tab" onclick="switchTab('closeddays')">📅 定休日設定</div>
  <div class="tab" onclick="switchTab('customers')">👥 顧客リスト</div>
</div>

<div class="content">

  <!-- ===== 予約受付コントロール ===== -->
  <div class="card" id="deadline-control" style="margin-bottom:16px; border-left:4px solid #E05241;">
    <div class="card-body" style="display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px;">
      <div>
        <div style="font-weight:700; font-size:15px;">⏰ 予約受付の締切</div>
        <div id="deadline-status" style="font-size:13px; color:#888; margin-top:4px;">読み込み中...</div>
      </div>
      <div style="display:flex; gap:6px; flex-wrap:wrap;">
        <button class="btn deadline-btn" data-hours="0" onclick="setDeadline(0,this)" style="padding:8px 14px; font-size:13px;">今すぐOK</button>
        <button class="btn deadline-btn" data-hours="1" onclick="setDeadline(1,this)" style="padding:8px 14px; font-size:13px;">1時間前</button>
        <button class="btn deadline-btn" data-hours="2" onclick="setDeadline(2,this)" style="padding:8px 14px; font-size:13px;">2時間前</button>
        <button class="btn deadline-btn" data-hours="3" onclick="setDeadline(3,this)" style="padding:8px 14px; font-size:13px;">3時間前</button>
      </div>
    </div>
  </div>

  <!-- ===== 予約管理 ===== -->
  <div id="panel-reservations" class="panel active">
    <div class="stats" id="reservation-stats"></div>

    <div class="filter-bar">
      <button class="filter-btn" onclick="filterReservations('today',this)">今日</button>
      <button class="filter-btn active" onclick="filterReservations('week',this)">今週</button>
      <button class="filter-btn" onclick="filterReservations('month',this)">今月</button>
      <button class="filter-btn" onclick="filterReservations('all',this)">すべて</button>
    </div>

    <div class="card">
      <div class="card-header">
        <span>予約一覧</span>
        <button class="btn btn-secondary" onclick="loadReservations()">更新</button>
      </div>
      <div class="card-body">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>日付</th>
                <th>時間</th>
                <th>お名前</th>
                <th>メニュー</th>
                <th>人数</th>
                <th>金額</th>
                <th>ステータス</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="reservations-body">
              <tr><td colspan="9" class="loading">読み込み中...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== 定休日設定 ===== -->
  <div id="panel-closeddays" class="panel">
    <div class="card">
      <div class="card-header">毎週の定休日</div>
      <div class="card-body">
        <div id="recurring-days"></div>
        <div class="form-row">
          <select id="add-dow" class="form-select">
            <option value="0">月曜日</option>
            <option value="1">火曜日</option>
            <option value="2">水曜日</option>
            <option value="3">木曜日</option>
            <option value="4">金曜日</option>
            <option value="5">土曜日</option>
            <option value="6">日曜日</option>
          </select>
          <button class="btn btn-primary" onclick="addRecurring()">追加</button>
        </div>
      </div>
    </div>

    <div class="card" style="margin-top:12px">
      <div class="card-header">臨時休業日</div>
      <div class="card-body">
        <div id="specific-days"></div>
        <div class="form-row">
          <input type="date" id="add-date" class="form-input">
          <input type="text" id="add-reason" class="form-input" placeholder="理由（例: GW休業）" style="flex:1">
          <button class="btn btn-primary" onclick="addSpecific()">追加</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== 顧客リスト ===== -->
  <div id="panel-customers" class="panel">
    <div class="stats" id="customer-stats"></div>
    <div class="card">
      <div class="card-header">
        <span>顧客一覧</span>
        <button class="btn btn-secondary" onclick="loadCustomers()">更新</button>
      </div>
      <div class="card-body">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>お名前</th>
                <th>電話番号</th>
                <th>来店回数</th>
                <th>最終来店日</th>
                <th>登録日</th>
              </tr>
            </thead>
            <tbody id="customers-body">
              <tr><td colspan="5" class="loading">読み込み中...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
const WEEKDAYS = ["月","火","水","木","金","土","日"];

// === API呼び出し（Cookie認証） ===
async function api(path, opts = {}) {
  const res = await fetch(path, {
    headers: {"Content-Type":"application/json"},
    credentials: "same-origin",
    ...opts
  });
  if (res.status === 401) {
    window.location.href = "/dashboard/login";
    return;
  }
  if (!res.ok) throw new Error("API Error: " + res.status);
  return res.json();
}

// === タブ切替 ===
function switchTab(name) {
  document.querySelectorAll(".tab").forEach((t,i) => {
    t.classList.toggle("active", ["reservations","closeddays","customers"][i] === name);
  });
  document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
  document.getElementById("panel-" + name).classList.add("active");

  if (name === "reservations") loadReservations();
  if (name === "closeddays") loadClosedDays();
  if (name === "customers") loadCustomers();
}

// === 予約管理 ===
let currentFilter = "week";
let allReservations = [];

function filterReservations(period, btn) {
  currentFilter = period;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  if (btn) btn.classList.add("active");
  loadReservations();
}

function getDateRange(period) {
  const now = new Date();
  const y = now.getFullYear(), m = now.getMonth(), d = now.getDate();
  const today = new Date(y, m, d).toISOString().slice(0,10);

  if (period === "today") return today;
  if (period === "week") return today;
  if (period === "month") return today;
  return "2020-01-01";
}

function filterByPeriod(rows, period) {
  const now = new Date();
  const y = now.getFullYear(), m = now.getMonth(), d = now.getDate();
  const todayStr = new Date(y,m,d).toISOString().slice(0,10);

  if (period === "today") return rows.filter(r => r.reservation_date === todayStr);
  if (period === "week") {
    const end = new Date(y,m,d+7);
    return rows.filter(r => r.reservation_date >= todayStr && r.reservation_date <= end.toISOString().slice(0,10));
  }
  if (period === "month") {
    const end = new Date(y,m+1,d);
    return rows.filter(r => r.reservation_date >= todayStr && r.reservation_date <= end.toISOString().slice(0,10));
  }
  return rows;
}

async function loadReservations() {
  const tbody = document.getElementById("reservations-body");
  tbody.innerHTML = '<tr><td colspan="9" class="loading">読み込み中...</td></tr>';
  try {
    const res = await api("/api/reservations?date_from=" + getDateRange(currentFilter));
    allReservations = res.data || [];
    const filtered = filterByPeriod(allReservations, currentFilter);
    renderReservations(filtered);
    renderReservationStats(filtered);
  } catch(e) {
    tbody.innerHTML = '<tr><td colspan="9" class="empty">データの取得に失敗しました</td></tr>';
  }
}

function renderReservations(rows) {
  const tbody = document.getElementById("reservations-body");
  if (!rows.length) {
    tbody.innerHTML = '<tr><td colspan="9" class="empty">予約はありません</td></tr>';
    return;
  }
  tbody.innerHTML = rows.map(r => {
    const dateObj = new Date(r.reservation_date + "T00:00:00");
    const wd = WEEKDAYS[dateObj.getDay() === 0 ? 6 : dateObj.getDay()-1];
    const dm = (dateObj.getMonth()+1) + "/" + dateObj.getDate();
    const statusClass = r.status === "confirmed" ? "badge-confirmed" : r.status === "cancelled" ? "badge-cancelled" : "badge-completed";
    const statusText = r.status === "confirmed" ? "確定" : r.status === "cancelled" ? "キャンセル済" : "完了";
    const cancelBtn = r.status === "confirmed"
      ? `<button class="btn btn-danger" onclick="cancelReservation(${r.id})">キャンセル</button>`
      : "-";
    const price = r.total_price ? "¥" + r.total_price.toLocaleString() : "¥0";
    return `<tr>
      <td>${r.id}</td>
      <td>${dm}(${wd})</td>
      <td>${r.reservation_time}〜</td>
      <td><strong>${r.guest_name}</strong></td>
      <td>${r.menu_name}</td>
      <td>${r.guests}名</td>
      <td>${price}</td>
      <td><span class="badge ${statusClass}">${statusText}</span></td>
      <td>${cancelBtn}</td>
    </tr>`;
  }).join("");
}

function renderReservationStats(rows) {
  const confirmed = rows.filter(r => r.status === "confirmed");
  const totalGuests = confirmed.reduce((s,r) => s + r.guests, 0);
  const totalRevenue = confirmed.reduce((s,r) => s + (r.total_price || 0), 0);
  document.getElementById("reservation-stats").innerHTML = `
    <div class="stat-card"><div class="stat-number">${confirmed.length}</div><div class="stat-label">予約件数</div></div>
    <div class="stat-card"><div class="stat-number">${totalGuests}</div><div class="stat-label">合計人数</div></div>
    <div class="stat-card"><div class="stat-number">¥${totalRevenue.toLocaleString()}</div><div class="stat-label">売上見込</div></div>
  `;
}

async function cancelReservation(id) {
  if (!confirm("予約 #" + id + " をキャンセルしますか？\nお客様にLINEでキャンセル通知が送信されます。")) return;
  try {
    await api("/api/reservations/" + id + "/cancel", {method:"POST"});
    loadReservations();
  } catch(e) {
    alert("キャンセルに失敗しました");
  }
}

// === 予約締切設定 ===
async function loadDeadline() {
  try {
    const res = await api("/api/settings/booking-deadline");
    updateDeadlineUI(res.value);
  } catch(e) {
    document.getElementById("deadline-status").textContent = "設定を取得できませんでした";
  }
}

function updateDeadlineUI(hours) {
  const labels = {0:"今すぐ予約OK", 1:"1時間前に締切", 2:"2時間前に締切", 3:"3時間前に締切"};
  const statusEl = document.getElementById("deadline-status");
  if (hours === 0) {
    statusEl.innerHTML = '🟢 <strong style="color:#2e7d32">今すぐ予約OK</strong> — 直前の予約を受け付けています';
  } else {
    statusEl.innerHTML = '🔒 <strong>' + hours + '時間前に締切</strong> — ' + hours + '時間以内の枠は予約できません';
  }
  document.querySelectorAll(".deadline-btn").forEach(b => {
    b.classList.toggle("active", parseInt(b.dataset.hours) === hours);
  });
}

async function setDeadline(hours, btn) {
  try {
    await api("/api/settings/booking-deadline", {
      method: "POST",
      body: JSON.stringify({hours: hours})
    });
    updateDeadlineUI(hours);
  } catch(e) {
    alert("設定の変更に失敗しました");
  }
}

// === 定休日設定 ===
async function loadClosedDays() {
  try {
    const res = await api("/api/closed-days");
    const days = res.data || [];
    renderClosedDays(days);
  } catch(e) {
    document.getElementById("recurring-days").innerHTML = '<div class="empty">取得に失敗しました</div>';
  }
}

function renderClosedDays(days) {
  const recurring = days.filter(d => d.is_recurring);
  const specific = days.filter(d => !d.is_recurring && d.closed_date);

  const recurEl = document.getElementById("recurring-days");
  if (!recurring.length) {
    recurEl.innerHTML = '<div class="empty" style="padding:12px 0">定休日は設定されていません</div>';
  } else {
    recurEl.innerHTML = recurring.map(d => `
      <div class="closed-item">
        <span>毎週 <strong>${WEEKDAYS[d.day_of_week]}曜日</strong>（${d.reason || "定休日"}）</span>
        <button class="btn btn-danger" onclick="deleteClosedDay(${d.id})">削除</button>
      </div>`).join("");
  }

  const specEl = document.getElementById("specific-days");
  if (!specific.length) {
    specEl.innerHTML = '<div class="empty" style="padding:12px 0">臨時休業日はありません</div>';
  } else {
    specEl.innerHTML = specific.map(d => {
      const dt = new Date(d.closed_date + "T00:00:00");
      const label = (dt.getMonth()+1) + "/" + dt.getDate() + "（" + WEEKDAYS[dt.getDay()===0?6:dt.getDay()-1] + "）";
      return `<div class="closed-item">
        <span><strong>${label}</strong> — ${d.reason || ""}</span>
        <button class="btn btn-danger" onclick="deleteClosedDay(${d.id})">削除</button>
      </div>`;
    }).join("");
  }
}

async function addRecurring() {
  const dow = parseInt(document.getElementById("add-dow").value);
  try {
    await api("/api/closed-days", {
      method:"POST",
      body: JSON.stringify({day_of_week: dow, reason: "定休日", is_recurring: true})
    });
    loadClosedDays();
  } catch(e) { alert("追加に失敗しました"); }
}

async function addSpecific() {
  const date = document.getElementById("add-date").value;
  const reason = document.getElementById("add-reason").value || "臨時休業";
  if (!date) { alert("日付を選択してください"); return; }
  try {
    await api("/api/closed-days", {
      method:"POST",
      body: JSON.stringify({closed_date: date, reason: reason, is_recurring: false})
    });
    document.getElementById("add-date").value = "";
    document.getElementById("add-reason").value = "";
    loadClosedDays();
  } catch(e) { alert("追加に失敗しました"); }
}

async function deleteClosedDay(id) {
  if (!confirm("この定休日設定を削除しますか？")) return;
  try {
    await api("/api/closed-days/" + id, {method:"DELETE"});
    loadClosedDays();
  } catch(e) { alert("削除に失敗しました"); }
}

// === 顧客リスト ===
async function loadCustomers() {
  const tbody = document.getElementById("customers-body");
  tbody.innerHTML = '<tr><td colspan="5" class="loading">読み込み中...</td></tr>';
  try {
    const res = await api("/api/customers");
    const customers = res.data || [];
    renderCustomers(customers);
    renderCustomerStats(customers);
  } catch(e) {
    tbody.innerHTML = '<tr><td colspan="5" class="empty">データの取得に失敗しました</td></tr>';
  }
}

function renderCustomers(rows) {
  const tbody = document.getElementById("customers-body");
  if (!rows.length) {
    tbody.innerHTML = '<tr><td colspan="5" class="empty">顧客データはまだありません</td></tr>';
    return;
  }
  tbody.innerHTML = rows.map(c => {
    const lastVisit = c.last_visit_date || "-";
    const created = c.created_at ? c.created_at.slice(0,10) : "-";
    return `<tr>
      <td><strong>${c.display_name || "未設定"}</strong></td>
      <td>${c.phone || "-"}</td>
      <td>${c.visit_count || 0}回</td>
      <td>${lastVisit}</td>
      <td>${created}</td>
    </tr>`;
  }).join("");
}

function renderCustomerStats(rows) {
  const total = rows.length;
  const repeaters = rows.filter(c => (c.visit_count || 0) >= 2).length;
  document.getElementById("customer-stats").innerHTML = `
    <div class="stat-card"><div class="stat-number">${total}</div><div class="stat-label">総顧客数</div></div>
    <div class="stat-card"><div class="stat-number">${repeaters}</div><div class="stat-label">リピーター（2回以上）</div></div>
  `;
}

// === 初期読み込み ===
loadDeadline();
loadReservations();
</script>
</body>
</html>
